name: Build and Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.suffix }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - target: aarch64-unknown-linux-gnu
            suffix: aarch64
          - target: armv7-unknown-linux-gnueabihf
            suffix: armv7
          - target: arm-unknown-linux-gnueabihf
            suffix: arm

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install cross
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Build for ${{ matrix.target }}
        working-directory: rust
        run: cross build --release --target ${{ matrix.target }}

      - name: Rename binary
        run: |
          cp rust/target/${{ matrix.target }}/release/sugar-wifi-conf \
             sugar-wifi-conf-${{ matrix.suffix }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: sugar-wifi-conf-${{ matrix.suffix }}
          path: sugar-wifi-conf-${{ matrix.suffix }}

  release:
    name: Create Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare release assets
        run: |
          mkdir -p release
          cp artifacts/sugar-wifi-conf-aarch64/sugar-wifi-conf-aarch64 release/
          cp artifacts/sugar-wifi-conf-armv7/sugar-wifi-conf-armv7 release/
          cp artifacts/sugar-wifi-conf-arm/sugar-wifi-conf-arm release/
          cp custom_config.json release/
          chmod +x release/sugar-wifi-conf-*

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            release/sugar-wifi-conf-aarch64
            release/sugar-wifi-conf-armv7
            release/sugar-wifi-conf-arm
            release/custom_config.json
