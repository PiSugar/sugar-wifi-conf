name: Build and Release

on:
  push:
    branches:
      - feature/refactor-rust
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      create_release:
        description: "Create a prerelease from the selected branch"
        required: false
        default: false
        type: boolean
      release_tag:
        description: "Optional tag for manual release testing"
        required: false
        type: string

permissions:
  contents: write

jobs:
  # ── Detect which components changed (branch pushes only) ────────
  detect-changes:
    name: Detect Changes
    if: ${{ !startsWith(github.ref, 'refs/tags/') && github.event_name != 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    outputs:
      server: ${{ steps.filter.outputs.server }}
      ble-ssh: ${{ steps.filter.outputs.ble-ssh }}
      pi-image: ${{ steps.filter.outputs.pi-image }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            server:
              - 'rust/**'
            ble-ssh:
              - 'ble-ssh-client/**'
            pi-image:
              - 'rust/**'
              - 'build-pi-image.sh'
              - 'custom_config.json'
              - 'install-bin.sh'

  # ── Server (sugar-wifi-conf) ────────────────────────────────────
  build-server:
    name: Build Server ${{ matrix.suffix }}
    needs: [detect-changes]
    if: >-
      always() && !cancelled() &&
      (startsWith(github.ref, 'refs/tags/') ||
       github.event_name == 'workflow_dispatch' ||
       needs.detect-changes.outputs.server == 'true' ||
       needs.detect-changes.outputs.pi-image == 'true')
    runs-on: ${{ matrix.runs_on }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-unknown-linux-gnu
            suffix: aarch64
            runs_on: ubuntu-latest
            build_tool: cross
            pkg_config_path: /usr/lib/aarch64-linux-gnu/pkgconfig
          - target: armv7-unknown-linux-gnueabihf
            suffix: armv7
            runs_on: ubuntu-latest
            build_tool: cross
            pkg_config_path: /usr/lib/arm-linux-gnueabihf/pkgconfig
          - target: arm-unknown-linux-gnueabihf
            suffix: armv6
            runs_on: self-hosted
            build_tool: zigbuild
            pkg_config_path: /usr/lib/arm-linux-gnueabihf/pkgconfig

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          targets: ${{ matrix.target }}

      - name: Ensure cross is installed
        if: matrix.build_tool == 'cross'
        run: |
          if command -v cross >/dev/null 2>&1; then
            cross --version
          else
            cargo install cross --git https://github.com/cross-rs/cross
          fi

      - name: Install armv6 build dependencies
        if: matrix.build_tool == 'zigbuild'
        run: |
          sudo dpkg --add-architecture armhf
          sudo apt-get update
          sudo apt-get install -y libdbus-1-dev:armhf pkg-config
          pip3 install ziglang --break-system-packages || pip3 install ziglang
          cargo install cargo-zigbuild

      - name: Build for ${{ matrix.target }}
        if: matrix.build_tool == 'cross'
        working-directory: rust
        env:
          PKG_CONFIG_ALLOW_CROSS: "1"
          PKG_CONFIG_PATH: ${{ matrix.pkg_config_path }}
        run: cross build --release --target ${{ matrix.target }}

      - name: Build armv6 for ${{ matrix.target }}
        if: matrix.build_tool == 'zigbuild'
        working-directory: rust
        env:
          PKG_CONFIG_ALLOW_CROSS: "1"
          PKG_CONFIG_PATH: ${{ matrix.pkg_config_path }}
        run: cargo zigbuild --release --target ${{ matrix.target }}

      - name: Rename binary
        run: |
          cp rust/target/${{ matrix.target }}/release/sugar-wifi-conf \
             sugar-wifi-conf-${{ matrix.suffix }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: sugar-wifi-conf-${{ matrix.suffix }}
          path: sugar-wifi-conf-${{ matrix.suffix }}

  # ── BLE SSH Client ──────────────────────────────────────────────
  build-ble-ssh:
    name: Build ble-ssh (macOS)
    needs: [detect-changes]
    if: >-
      always() && !cancelled() &&
      (startsWith(github.ref, 'refs/tags/') ||
       github.event_name == 'workflow_dispatch' ||
       needs.detect-changes.outputs.ble-ssh == 'true')
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            suffix: aarch64
          - target: x86_64-apple-darwin
            suffix: x86_64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          targets: ${{ matrix.target }}

      - name: Build ble-ssh
        working-directory: ble-ssh-client
        run: cargo build --release --target ${{ matrix.target }} --bin ble-ssh

      - name: Create .app bundle
        run: |
          APP="ble-ssh-macos-${{ matrix.suffix }}.app"
          mkdir -p "$APP/Contents/MacOS"
          mkdir -p "$APP/Contents/Resources"
          cp ble-ssh-client/target/${{ matrix.target }}/release/ble-ssh \
             "$APP/Contents/MacOS/ble-ssh"
          cat > "$APP/Contents/Info.plist" << 'PLIST'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN"
            "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>CFBundleExecutable</key>
            <string>ble-ssh</string>
            <key>CFBundleIdentifier</key>
            <string>com.pisugar.ble-ssh</string>
            <key>CFBundleName</key>
            <string>BLE SSH</string>
            <key>CFBundleVersion</key>
            <string>0.2.0</string>
            <key>CFBundleShortVersionString</key>
            <string>0.2.0</string>
            <key>CFBundlePackageType</key>
            <string>APPL</string>
            <key>LSUIElement</key>
            <true/>
            <key>NSBluetoothAlwaysUsageDescription</key>
            <string>BLE SSH needs Bluetooth to connect to PiSugar devices.</string>
          </dict>
          </plist>
          PLIST
          # Ad-hoc code sign so macOS shows "unidentified developer" instead of "damaged"
          codesign --force --deep -s - "$APP"
          # Zip the .app bundle for upload
          zip -r "ble-ssh-macos-${{ matrix.suffix }}.zip" "$APP"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ble-ssh-macos-${{ matrix.suffix }}
          path: ble-ssh-macos-${{ matrix.suffix }}.zip

  build-ble-ssh-windows:
    name: Build ble-ssh (Windows)
    needs: [detect-changes]
    if: >-
      always() && !cancelled() &&
      (startsWith(github.ref, 'refs/tags/') ||
       github.event_name == 'workflow_dispatch' ||
       needs.detect-changes.outputs.ble-ssh == 'true')
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-pc-windows-msvc
            suffix: x86_64
          - target: aarch64-pc-windows-msvc
            suffix: aarch64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          targets: ${{ matrix.target }}

      - name: Build ble-ssh
        working-directory: ble-ssh-client
        run: cargo build --release --target ${{ matrix.target }} --bin ble-ssh

      - name: Package binary
        shell: bash
        run: |
          mkdir -p release-win
          cp ble-ssh-client/target/${{ matrix.target }}/release/ble-ssh.exe \
             release-win/ble-ssh.exe
          cd release-win && 7z a -tzip "../ble-ssh-windows-${{ matrix.suffix }}.zip" ble-ssh.exe

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ble-ssh-windows-${{ matrix.suffix }}
          path: ble-ssh-windows-${{ matrix.suffix }}.zip

  build-ble-ssh-linux:
    name: Build ble-ssh (Linux ${{ matrix.suffix }})
    needs: [detect-changes]
    if: >-
      always() && !cancelled() &&
      (startsWith(github.ref, 'refs/tags/') ||
       github.event_name == 'workflow_dispatch' ||
       needs.detect-changes.outputs.ble-ssh == 'true')
    runs-on: ${{ matrix.runs_on }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            suffix: x86_64
            runs_on: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            suffix: aarch64
            runs_on: self-hosted

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          targets: ${{ matrix.target }}

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libdbus-1-dev libgtk-3-dev libxdo-dev pkg-config

      - name: Build ble-ssh
        working-directory: ble-ssh-client
        run: cargo build --release --target ${{ matrix.target }} --bin ble-ssh

      - name: Package binary
        run: |
          cp ble-ssh-client/target/${{ matrix.target }}/release/ble-ssh \
             ble-ssh-linux-${{ matrix.suffix }}
          chmod +x ble-ssh-linux-${{ matrix.suffix }}
          tar czf ble-ssh-linux-${{ matrix.suffix }}.tar.gz ble-ssh-linux-${{ matrix.suffix }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ble-ssh-linux-${{ matrix.suffix }}
          path: ble-ssh-linux-${{ matrix.suffix }}.tar.gz

  # ── Raspberry Pi Image ──────────────────────────────────────────
  build-pi-image:
    name: Build Pi Image (${{ matrix.variant }}-${{ matrix.arch }})
    needs: [detect-changes, build-server]
    if: >-
      always() && !cancelled() &&
      needs.build-server.result == 'success' &&
      (startsWith(github.ref, 'refs/tags/') ||
       github.event_name == 'workflow_dispatch' ||
       needs.detect-changes.outputs.pi-image == 'true')
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: arm64
            variant: lite
            binary_artifact: sugar-wifi-conf-aarch64
          - arch: armhf
            variant: lite
            binary_artifact: sugar-wifi-conf-armv6
          - arch: arm64
            variant: desktop
            binary_artifact: sugar-wifi-conf-aarch64
          - arch: armhf
            variant: desktop
            binary_artifact: sugar-wifi-conf-armv6

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download binary artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ matrix.binary_artifact }}
          path: artifacts

      - name: Install image build dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq cloud-guest-utils e2fsprogs xz-utils

      - name: Build Pi image
        run: |
          chmod +x artifacts/${{ matrix.binary_artifact }}
          sudo bash build-pi-image.sh \
            ${{ matrix.arch }} \
            ${{ matrix.variant }} \
            artifacts/${{ matrix.binary_artifact }} \
            custom_config.json \
            sugar-wifi-conf-raspios-${{ matrix.variant }}-${{ matrix.arch }}

      - name: Upload image artifact
        uses: actions/upload-artifact@v4
        with:
          name: sugar-wifi-conf-raspios-${{ matrix.variant }}-${{ matrix.arch }}
          path: |
            sugar-wifi-conf-raspios-${{ matrix.variant }}-${{ matrix.arch }}.img.xz
            sugar-wifi-conf-raspios-${{ matrix.variant }}-${{ matrix.arch }}.base-image.txt

  # ── Release ──────────────────────────────────────────────────────
  release:
    name: Create Release
    needs: [build-server, build-ble-ssh, build-ble-ssh-windows, build-ble-ssh-linux, build-pi-image]
    if: >-
      always() && !cancelled() &&
      !contains(needs.*.result, 'failure') &&
      (startsWith(github.ref, 'refs/tags/') || (github.event_name == 'workflow_dispatch' && inputs.create_release))
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve release metadata
        id: meta
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
            echo "name=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
            echo "draft=false" >> "$GITHUB_OUTPUT"
          else
            SAFE_REF="${GITHUB_REF_NAME//\//-}"
            TAG="${{ inputs.release_tag }}"
            if [[ -z "$TAG" ]]; then
              TAG="test-${SAFE_REF}-${GITHUB_RUN_NUMBER}"
            fi
            echo "tag=$TAG" >> "$GITHUB_OUTPUT"
            echo "name=Test Release $TAG" >> "$GITHUB_OUTPUT"
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
            echo "draft=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare release assets
        run: |
          mkdir -p release
          cp artifacts/sugar-wifi-conf-aarch64/sugar-wifi-conf-aarch64 release/
          cp artifacts/sugar-wifi-conf-armv7/sugar-wifi-conf-armv7 release/
          cp artifacts/sugar-wifi-conf-armv6/sugar-wifi-conf-armv6 release/
          cp artifacts/ble-ssh-macos-aarch64/ble-ssh-macos-aarch64.zip release/
          cp artifacts/ble-ssh-macos-x86_64/ble-ssh-macos-x86_64.zip release/
          cp artifacts/ble-ssh-windows-x86_64/ble-ssh-windows-x86_64.zip release/
          cp artifacts/ble-ssh-windows-aarch64/ble-ssh-windows-aarch64.zip release/
          cp artifacts/ble-ssh-linux-x86_64/ble-ssh-linux-x86_64.tar.gz release/
          cp artifacts/ble-ssh-linux-aarch64/ble-ssh-linux-aarch64.tar.gz release/
          cp artifacts/sugar-wifi-conf-raspios-lite-arm64/sugar-wifi-conf-raspios-lite-arm64.img.xz release/
          cp artifacts/sugar-wifi-conf-raspios-lite-armhf/sugar-wifi-conf-raspios-lite-armhf.img.xz release/
          cp artifacts/sugar-wifi-conf-raspios-desktop-arm64/sugar-wifi-conf-raspios-desktop-arm64.img.xz release/
          cp artifacts/sugar-wifi-conf-raspios-desktop-armhf/sugar-wifi-conf-raspios-desktop-armhf.img.xz release/
          cp custom_config.json release/
          chmod +x release/sugar-wifi-conf-*

      - name: Build release body
        id: body
        run: |
          BODY="## Raspberry Pi Images\n\n"
          BODY+="| Image | Base Image |\n"
          BODY+="|-------|------------|\n"
          for f in artifacts/sugar-wifi-conf-raspios-*/sugar-wifi-conf-raspios-*.base-image.txt; do
            [ -f "$f" ] || continue
            BASE=$(cat "$f")
            NAME=$(basename "$f" .base-image.txt)
            BODY+="| ${NAME}.img.xz | ${BASE} |\n"
          done
          # Write to file to avoid escaping issues
          printf "$BODY" > release-body.md
          echo "path=release-body.md" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          name: ${{ steps.meta.outputs.name }}
          target_commitish: ${{ github.sha }}
          prerelease: ${{ steps.meta.outputs.prerelease }}
          draft: ${{ steps.meta.outputs.draft }}
          generate_release_notes: true
          body_path: ${{ steps.body.outputs.path }}
          append_body: true
          files: |
            release/sugar-wifi-conf-aarch64
            release/sugar-wifi-conf-armv7
            release/sugar-wifi-conf-armv6
            release/ble-ssh-macos-aarch64.zip
            release/ble-ssh-macos-x86_64.zip
            release/ble-ssh-windows-x86_64.zip
            release/ble-ssh-windows-aarch64.zip
            release/ble-ssh-linux-x86_64.tar.gz
            release/ble-ssh-linux-aarch64.tar.gz
            release/sugar-wifi-conf-raspios-lite-arm64.img.xz
            release/sugar-wifi-conf-raspios-lite-armhf.img.xz
            release/sugar-wifi-conf-raspios-desktop-arm64.img.xz
            release/sugar-wifi-conf-raspios-desktop-armhf.img.xz
            release/custom_config.json
