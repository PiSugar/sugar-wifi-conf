name: Build and Release

on:
  push:
    branches:
      - feature/refactor-rust
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      create_release:
        description: "Create a prerelease from the selected branch"
        required: false
        default: false
        type: boolean
      release_tag:
        description: "Optional tag for manual release testing"
        required: false
        type: string

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.suffix }}
    runs-on: ${{ matrix.runs_on }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-unknown-linux-gnu
            suffix: aarch64
            runs_on: ubuntu-latest
            build_tool: cross
            pkg_config_path: /usr/lib/aarch64-linux-gnu/pkgconfig
          - target: armv7-unknown-linux-gnueabihf
            suffix: armv7
            runs_on: ubuntu-latest
            build_tool: cross
            pkg_config_path: /usr/lib/arm-linux-gnueabihf/pkgconfig
          - target: arm-unknown-linux-gnueabihf
            suffix: armv6
            runs_on: self-hosted
            build_tool: zigbuild
            pkg_config_path: /usr/lib/arm-linux-gnueabihf/pkgconfig

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          targets: ${{ matrix.target }}

      - name: Ensure cross is installed
        if: matrix.build_tool == 'cross'
        run: |
          if command -v cross >/dev/null 2>&1; then
            cross --version
          else
            cargo install cross --git https://github.com/cross-rs/cross
          fi

      - name: Install armv6 build dependencies
        if: matrix.build_tool == 'zigbuild'
        run: |
          sudo dpkg --add-architecture armhf
          sudo apt-get update
          sudo apt-get install -y libdbus-1-dev:armhf pkg-config
          pip3 install ziglang --break-system-packages || pip3 install ziglang
          cargo install cargo-zigbuild

      - name: Build for ${{ matrix.target }}
        if: matrix.build_tool == 'cross'
        working-directory: rust
        env:
          PKG_CONFIG_ALLOW_CROSS: "1"
          PKG_CONFIG_PATH: ${{ matrix.pkg_config_path }}
        run: cross build --release --target ${{ matrix.target }}

      - name: Build armv6 for ${{ matrix.target }}
        if: matrix.build_tool == 'zigbuild'
        working-directory: rust
        env:
          PKG_CONFIG_ALLOW_CROSS: "1"
          PKG_CONFIG_PATH: ${{ matrix.pkg_config_path }}
        run: cargo zigbuild --release --target ${{ matrix.target }}

      - name: Rename binary
        run: |
          cp rust/target/${{ matrix.target }}/release/sugar-wifi-conf \
             sugar-wifi-conf-${{ matrix.suffix }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: sugar-wifi-conf-${{ matrix.suffix }}
          path: sugar-wifi-conf-${{ matrix.suffix }}

  build-ble-ssh:
    name: Build ble-ssh (macOS)
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            suffix: aarch64
          - target: x86_64-apple-darwin
            suffix: x86_64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          targets: ${{ matrix.target }}

      - name: Build ble-ssh
        working-directory: ble-ssh-client
        run: cargo build --release --target ${{ matrix.target }} --bin ble-ssh

      - name: Create .app bundle
        run: |
          APP="ble-ssh-macos-${{ matrix.suffix }}.app"
          mkdir -p "$APP/Contents/MacOS"
          mkdir -p "$APP/Contents/Resources"
          cp ble-ssh-client/target/${{ matrix.target }}/release/ble-ssh \
             "$APP/Contents/MacOS/ble-ssh"
          cat > "$APP/Contents/Info.plist" << 'PLIST'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN"
            "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>CFBundleExecutable</key>
            <string>ble-ssh</string>
            <key>CFBundleIdentifier</key>
            <string>com.pisugar.ble-ssh</string>
            <key>CFBundleName</key>
            <string>BLE SSH</string>
            <key>CFBundleVersion</key>
            <string>0.2.0</string>
            <key>CFBundleShortVersionString</key>
            <string>0.2.0</string>
            <key>CFBundlePackageType</key>
            <string>APPL</string>
            <key>LSUIElement</key>
            <true/>
            <key>NSBluetoothAlwaysUsageDescription</key>
            <string>BLE SSH needs Bluetooth to connect to PiSugar devices.</string>
          </dict>
          </plist>
          PLIST
          # Ad-hoc code sign so macOS shows "unidentified developer" instead of "damaged"
          codesign --force --deep -s - "$APP"
          # Zip the .app bundle for upload
          zip -r "ble-ssh-macos-${{ matrix.suffix }}.zip" "$APP"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ble-ssh-macos-${{ matrix.suffix }}
          path: ble-ssh-macos-${{ matrix.suffix }}.zip

  release:
    name: Create Release
    needs: [build, build-ble-ssh]
    if: startsWith(github.ref, 'refs/tags/') || (github.event_name == 'workflow_dispatch' && inputs.create_release)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve release metadata
        id: meta
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
            echo "name=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
            echo "draft=false" >> "$GITHUB_OUTPUT"
          else
            SAFE_REF="${GITHUB_REF_NAME//\//-}"
            TAG="${{ inputs.release_tag }}"
            if [[ -z "$TAG" ]]; then
              TAG="test-${SAFE_REF}-${GITHUB_RUN_NUMBER}"
            fi
            echo "tag=$TAG" >> "$GITHUB_OUTPUT"
            echo "name=Test Release $TAG" >> "$GITHUB_OUTPUT"
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
            echo "draft=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare release assets
        run: |
          mkdir -p release
          cp artifacts/sugar-wifi-conf-aarch64/sugar-wifi-conf-aarch64 release/
          cp artifacts/sugar-wifi-conf-armv7/sugar-wifi-conf-armv7 release/
          cp artifacts/sugar-wifi-conf-armv6/sugar-wifi-conf-armv6 release/
          cp artifacts/ble-ssh-macos-aarch64/ble-ssh-macos-aarch64.zip release/
          cp artifacts/ble-ssh-macos-x86_64/ble-ssh-macos-x86_64.zip release/
          cp custom_config.json release/
          chmod +x release/sugar-wifi-conf-*

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          name: ${{ steps.meta.outputs.name }}
          target_commitish: ${{ github.sha }}
          prerelease: ${{ steps.meta.outputs.prerelease }}
          draft: ${{ steps.meta.outputs.draft }}
          generate_release_notes: true
          files: |
            release/sugar-wifi-conf-aarch64
            release/sugar-wifi-conf-armv7
            release/sugar-wifi-conf-armv6
            release/ble-ssh-macos-aarch64.zip
            release/ble-ssh-macos-x86_64.zip
            release/custom_config.json
