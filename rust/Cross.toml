[target.aarch64-unknown-linux-gnu]
pre-build = [
    "dpkg --add-architecture arm64 && apt-get update && apt-get install -y libdbus-1-dev:arm64 pkg-config"
]

[target.aarch64-unknown-linux-gnu.env]
passthrough = ["PKG_CONFIG_ALLOW_CROSS", "PKG_CONFIG_PATH"]

[target.armv7-unknown-linux-gnueabihf]
pre-build = [
    "dpkg --add-architecture armhf && apt-get update && apt-get install -y libdbus-1-dev:armhf pkg-config"
]

[target.armv7-unknown-linux-gnueabihf.env]
passthrough = ["PKG_CONFIG_ALLOW_CROSS", "PKG_CONFIG_PATH"]

[target.arm-unknown-linux-gnueabihf]
pre-build = [
    "dpkg --add-architecture armhf && apt-get update && apt-get install -y libdbus-1-dev:armhf pkg-config"
]

[target.arm-unknown-linux-gnueabihf.env]
passthrough = ["PKG_CONFIG_ALLOW_CROSS", "PKG_CONFIG_PATH"]
